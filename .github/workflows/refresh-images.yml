name: Refresh trusted product images

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Limit products. Empty = all"
        required: false
        default: "50"
      ids:
        description: "Comma-separated product num values, e.g. 24053,24054"
        required: false
        default: ""
      replace:
        description: "Replace existing images after strict validation"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]
      min_score:
        description: "Minimum confidence score"
        required: true
        default: "62"

permissions:
  contents: write

jobs:
  refresh-images:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-images.txt

      - name: Ensure products.csv exists
        run: |
          if [ ! -f download/_work/products.csv ]; then
            python scripts/product_index_to_products_csv.py
          fi

      - name: Audit existing image logs
        run: |
          python scripts/scrape_images_trusted.py --audit-existing || true

      - name: Run trusted scraper
        env:
          LIMIT: ${{ github.event.inputs.limit }}
          IDS: ${{ github.event.inputs.ids }}
          REPLACE: ${{ github.event.inputs.replace }}
          MIN_SCORE: ${{ github.event.inputs.min_score }}
        run: |
          ARGS="--workers 3 --min-score ${MIN_SCORE}"
          if [ "${REPLACE}" = "true" ]; then ARGS="${ARGS} --replace"; fi
          if [ -n "${LIMIT}" ]; then ARGS="${ARGS} --limit ${LIMIT}"; fi
          if [ -n "${IDS}" ]; then ARGS="${ARGS} --ids ${IDS}"; fi
          python scripts/scrape_images_trusted.py ${ARGS}

      - name: Rebuild product index
        run: |
          python scripts/build_product_index.py

      - name: Commit image updates
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add download/product_images download/product_images_old download/product_index.json download/_work/*.csv download/_work/*.log || true
          if git diff --cached --quiet; then
            echo "No image changes."
          else
            git commit -m "Refresh trusted product images"
            git push
          fi
